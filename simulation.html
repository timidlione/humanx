const params = new URLSearchParams(location.search);
const modCode = params.get('mod') || 'H-01';

document.getElementById('mod-code').textContent = mod.code;
document.getElementById('mod-title').textContent = mod.title;
document.getElementById('instructions').innerHTML = mod.instructions;
document.getElementById('stage-label').textContent = `${mod.tier.toUpperCase()} // ${mod.code}`;

// Session ID
const today = new Date().toISOString().slice(0,10).replace(/-/g,'');
const rand = Math.floor(Math.random() * 900 + 100);
document.getElementById('session-id').textContent = `HX-${today}-${rand}`;

// Countdown
let remaining = mod.duration || 1800;
const tEl = document.getElementById('timer');
const tick = () => {
  if (remaining <= 0) { tEl.textContent = '00:00:00'; return; }
  remaining -= 1;
  const h = String(Math.floor(remaining / 3600)).padStart(2, '0');
  const m = String(Math.floor((remaining % 3600) / 60)).padStart(2, '0');
  const s = String(remaining % 60).padStart(2, '0');
  tEl.textContent = `${h}:${m}:${s}`;
};
setInterval(tick, 1000);

// Neural load drift
let neural = 52.0;
setInterval(() => {
  neural += (Math.random() - 0.45) * 1.5;
  neural = Math.max(40, Math.min(95, neural));
  document.getElementById('neural-load').textContent = neural.toFixed(1) + '%';
}, 2200);

// =============================================================
const stage = document.getElementById('stage');

if (mod.type === 'flag') renderFlag(mod);
else if (mod.type === 'mcq') renderMCQ(mod);
else if (mod.type === 'open') renderOpen(mod);

      let correct = 0, incorrect = 0;
      flagged.forEach(node => {
        if (node.dataset.truth === 'false') correct++; else incorrect++;

function renderMCQ(m) {
  let idx = 0;
  let answered = [];

  document.getElementById('progress-text').textContent = `0 / ${m.questions.length}`;
  document.getElementById('score-remaining').textContent = m.questions.length + '문항';

  function paint() {
    const q = m.questions[idx];
    stage.innerHTML = `
      <div class="border border-on-surface bg-background p-6">
        <div class="flex items-baseline justify-between mb-4">
          <span class="font-label-sm text-label-sm uppercase text-outline">문항 ${idx+1} / ${m.questions.length}</span>
          <span class="font-label-sm text-label-sm uppercase text-primary">단일 선택</span>
        </div>
        <p class="kr text-[16px] leading-relaxed">${q.q}</p>
        <div class="mt-6 space-y-3" id="opts">
          ${q.opts.map((o, i) => `
            <div class="mcq-opt p-4 kr text-[15px] flex items-baseline gap-3" data-i="${i}">
              <span class="font-label-sm text-label-sm text-outline">${String.fromCharCode(65+i)}</span>
              <span>${o}</span>
            </div>
          `).join('')}
        </div>
        <div id="mcq-note" class="hidden mt-5 p-4 border-l-2 border-primary bg-primary-fixed text-[14px] kr leading-relaxed">
          <strong class="block mb-1 text-primary uppercase font-label-sm">해설</strong>
          <span id="mcq-note-body"></span>
        </div>
      </div>
      <div class="mt-6 flex justify-between items-center">
        <span class="font-label-sm text-label-sm text-outline uppercase">정답 ${answered.filter(a => a.correct).length} / 선택 ${answered.length}</span>
        <button id="next-btn" disabled
          class="bg-on-surface text-background px-6 py-3 disabled:opacity-30 disabled:cursor-not-allowed hover:bg-primary transition-colors flex items-center gap-2">
          <span>${idx === m.questions.length - 1 ? '분석 제출' : '다음 문항'}</span>
          <span class="material-symbols-outlined text-[18px]">${idx === m.questions.length - 1 ? 'arrow_outward' : 'arrow_forward'}</span>
        </button>
      </div>
    `;

    let chosen = null;
    document.querySelectorAll('.mcq-opt').forEach(el => {
      el.addEventListener('click', () => {
        if (chosen !== null) return;
        chosen = parseInt(el.dataset.i);
        const isCorrect = chosen === q.correct;
        el.classList.add(isCorrect ? 'correct' : 'wrong');
        if (!isCorrect) {
          document.querySelector(`.mcq-opt[data-i="${q.correct}"]`).classList.add('correct');
        }
        document.getElementById('mcq-note').classList.remove('hidden');
        document.getElementById('mcq-note-body').textContent = q.note;
        document.getElementById('next-btn').disabled = false;
        answered.push({ idx, chosen, correct: isCorrect });

        // HUD update
        const correctCount = answered.filter(a => a.correct).length;
        const completion = Math.round(((idx + 1) / m.questions.length) * 100);
        document.getElementById('score-accuracy').textContent = correctCount + '/' + answered.length;
        document.getElementById('score-completion').textContent = completion + '%';
        document.getElementById('progress-text').textContent = `${idx+1} / ${m.questions.length}`;
        document.getElementById('score-remaining').textContent = (m.questions.length - idx - 1) + '문항';
      });
    });

    document.getElementById('next-btn').addEventListener('click', () => {
      if (idx === m.questions.length - 1) {
        const correctCount = answered.filter(a => a.correct).length;
        const score = Math.round((correctCount / m.questions.length) * 100);
        saveResult(m, score, { correctCount, total: m.questions.length });
        window.location.href = 'benchmark.html';
      } else {
        idx++;
        paint();
      }
    });
  }
  paint();
}

      <span class="font-label-sm text-label-sm uppercase text-outline">평가 축</span>
      <ul class="kr text-[13px] mt-3 space-y-1">
        ${m.rubric.map((r, i) => `<li class="text-on-surface-variant">• ${r}</li>`).join('')}
      </ul>
    </div>
  `;

  const ta = document.getElementById('open-ta');
  const cc = document.getElementById('char-count');
  const btn = document.getElementById('open-submit');
  ta.addEventListener('input', () => {
    const t = ta.value.trim();
    const words = t ? t.split(/\s+/).length : 0;
    cc.textContent = `${ta.value.length} 글자 · ${words} 단어`;
    btn.disabled = words < Math.floor(m.minWords * 0.5);
    const completion = Math.min(100, Math.round((words / m.minWords) * 100));
    document.getElementById('score-completion').textContent = completion + '%';
    document.getElementById('progress-text').textContent = `${words} / ${m.minWords}`;
    document.getElementById('score-remaining').textContent = Math.max(0, m.minWords - words) + '단어';
  });
  btn.addEventListener('click', () => {
    const t = ta.value.trim();
    const words = t ? t.split(/\s+/).length : 0;
    const lengthScore = Math.min(100, (words / m.minWords) * 70);
    const richness = Math.min(30, (new Set(t.split(/\s+/)).size / Math.max(words,1)) * 30);
    const score = Math.round(lengthScore + richness);
    saveResult(m, score, { words, length: ta.value.length, text: t.slice(0, 500) });
    window.location.href = 'benchmark.html';
  });
}

// =============================================================
// SAVE RESULT for benchmark.html
// =============================================================
function saveResult(m, score, detail) {
  const payload = {
    mod: m.code,
    title: m.title,
    tier: m.tier,
    type: m.type,
    score,            // 0-100 raw module score
    detail,
    timestamp: Date.now()
  };
  try { localStorage.setItem('humanx:last-result', JSON.stringify(payload)); } catch(e) {}
}
</script>
